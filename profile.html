<!DOCTYPE html>
<html lang="en">
<head>
    <title>Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center">User Profile</h3>

        <input type="text" id="name" class="form-control mb-2" placeholder="Name" disabled>
        <input type="email" id="email" class="form-control mb-2" placeholder="Email" disabled>

        <input type="number" id="age" class="form-control mb-2" placeholder="Age">
        <input type="date" id="dob" class="form-control mb-2">
        <input type="text" id="contact" class="form-control mb-3" placeholder="Contact">

        <button id="saveBtn" class="btn btn-primary w-100">Save Profile</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
